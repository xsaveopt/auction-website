name: CI

# Push to main → :dev (rolling, overwritten each push). Push of v*.*.* tag →
# semver tags (1.2.3, 1.2, 1) plus :latest (skipped for pre-releases like
# v1.2.3-rc1). Other branches/PRs just sanity-build to surface breakage.
on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Lint, format & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo_sqlite, apcu
          ini-values: apc.enable_cli=1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install PHP deps
        uses: ramsey/composer-install@v4

      - name: Install JS deps
        run: npm ci

      - run: composer format:check
      - run: composer lint
      - run: npm run format:check
      - run: npm run lint

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - run: composer test

  docker:
    name: Docker build (no push)
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-dev:
    name: Publish :dev image
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auction-website:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/auction-website
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
